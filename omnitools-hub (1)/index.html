<!doctype html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google-site-verification" content="tHNEOq181uhO54tXMAW7nu7ucfmxyuO54HFDKb9B82o" />
    <title>AMGODE - مركز الأدوات الاحترافي الشامل</title>

    <!-- أكواد التتبع والشبكات الإعلانية الأساسية -->
    <script src="https://effectivecpmnetwork.com"></script>
    <script src="https://effectivecpmnetwork.com"></script>

    <!-- كود ذكي لتنفيذ النوافذ المنبثقة عند الضغط على الأدوات والبانرات داخل React -->
    <script>
        // 1. فتح إعلان الرابط المباشر عند الضغط على أي أداة أو زر في الموقع
        document.addEventListener('click', function(event) {
            // يتحقق إذا كانت النقرة على رابط، زر، أو أي عنصر يبدو كأداة
            const clickedElement = event.target.closest('a, button, [role="button"], div[class*="card"]');
            if (clickedElement) {
                window.open("https://effectivecpmnetwork.com", "_blank");
            }
        });

        // 2. حقن إعلانات البانر أسفل الموقع ديناميكيًا لضمان عدم مسحها بواسطة React
        window.addEventListener('DOMContentLoaded', () => {
            const adData = [
                { key: '28ff5195704b5c68499f81b631600817', format: 'iframe', h: 60, w: 468 },
                { key: 'f8019d1e9ad780cb15eaf6f173e81404', format: 'iframe', h: 250, w: 300 },
                { key: '43a4203b1b25713a8a4cdd19079e9e94', format: 'iframe', h: 300, w: 160 },
                { key: '2d972880a66e657faf149c98af5341f3', format: 'iframe', h: 600, w: 160 },
                { key: '3a3932ebabd1d674242fb927c4df4b20', format: 'iframe', h: 50, w: 320 },
                { key: '31d92497616bbef6edebfcc311f712d9', format: 'iframe', h: 90, w: 728 }
            ];

            adData.forEach(ad => {
                const container = document.createElement('div');
                container.style.cssText = 'text-align: center; margin: 20px auto; padding: 10px; max-width: 100%;';
                
                const confScript = document.createElement('script');
                confScript.text = `atOptions = { 'key' : '${ad.key}', 'format' : '${ad.format}', 'height' : ${ad.h}, 'width' : ${ad.w}, 'params' : {} };`;
                
                const loadScript = document.createElement('script');
                loadScript.src = `https://highperformanceformat.com{ad.key}/invoke.js`;
                
                container.appendChild(confScript);
                container.appendChild(loadScript);
                document.body.appendChild(container);
            });
        });
    </script>
</head>

<body class="bg-slate-950 text-gray-100">
    <!-- حاوية تطبيق الـ React الرئيسية -->
    <div id="root"></div>

    <!-- تفعيل ملف الـ React البرمجي الأساسي للموقع -->
    <script type="module" src="/src/main.tsx"></script>
</body>
</html>
